[DEFAULT]
app_name = Virtual Try-On
app_version = 1.0.0

[API]
# HuggingFace IDM-VTON Space endpoint
hf_space = yisol/IDM-VTON
# Max retries if the Space is sleeping (cold start)
max_retries = 3
timeout_seconds = 120

[IMAGE]
# Dimensions IDM-VTON expects
max_width = 768
max_height = 1024
# Allowed upload formats
allowed_extensions = jpg,jpeg,png,webp
max_file_size_mb = 10

[SERVER]
host = 0.0.0.0
port = 8000
reload = True